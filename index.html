<!DOCTYPE html>
<html>
<head>
    <title>Live Work Timer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        #timer { font-size: 4rem; font-weight: bold; margin: 20px; color: #333; }
        #history { text-align: left; max-width: 400px; margin: 20px auto; }
        li { background: white; padding: 10px; margin-bottom: 5px; border-radius: 5px; list-style: none; border-left: 5px solid #dc3545; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxV8Jd4DU_91d0Ccy6clopQB13AJCGxEA",
            databaseURL: "https://daddityme-5f770-default-rtdb.firebaseio.com",
            projectId: "daddityme-5f770"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let startTime = null;

        // 1. Sync Timer and History
        onValue(ref(db, 'timerState'), (snapshot) => {
            const data = snapshot.val();
            startTime = data ? data.start : null;
            document.getElementById('timer').innerText = startTime ? "Counting..." : "00:00:00";
        });

        onValue(ref(db, 'history'), (snapshot) => {
            const list = document.getElementById('history');
            list.innerHTML = "<h3>History</h3>";
            snapshot.forEach((child) => {
                const item = child.val();
                list.innerHTML += `<li>${item.entry}</li>`;
            });
        });

        // 2. Password-protected actions
        window.performAction = (type) => {
            const pass = prompt("Enter Password:");
            if (pass !== "Elettrica1") return alert("Wrong Password!");

            if (type === 'start') {
                update(ref(db, 'timerState'), { start: Date.now(), password: pass });
            } else {
                const duration = document.getElementById('timer').innerText;
                const entry = `Shift ended at ${new Date().toLocaleTimeString()}`;
                push(ref(db, 'history'), { entry: entry, password: pass });
                update(ref(db, 'timerState'), { start: null, password: pass });
            }
        };
    </script>
</head>
<body>
    <h1>Work Timer</h1>
    <div id="timer">00:00:00</div>
    <button onclick="performAction('start')">Start Timer</button>
    <button onclick="performAction('stop')">Stop Timer</button>
    <ul id="history"></ul>
</body>
</html>
