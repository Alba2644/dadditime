<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daddi Elettrica Timer</title>
    <style>
        :root { --primary: #2563eb; --danger: #dc2626; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #timer { font-size: 3.5rem; font-weight: 800; color: #1e293b; margin: 20px 0; font-variant-numeric: tabular-nums; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 18px; font-size: 1rem; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        #startBtn { background: var(--primary); color: white; }
        #stopBtn { background: var(--danger); color: white; }
        h3 { color: #64748b; margin-top: 30px; }
        #history { list-style: none; padding: 0; margin-top: 10px; text-align: left; }
        li { background: #f1f5f9; padding: 12px; margin-bottom: 8px; border-radius: 8px; font-size: 0.9rem; border-left: 4px solid var(--primary); }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxV8Jd4DU_91d0Ccy6clopQB13AJCGxEA",
            databaseURL: "https://daddityme-5f770-default-rtdb.firebaseio.com",
            projectId: "daddityme-5f770"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        let currentStart = null;

        onValue(ref(db, 'timerState'), (snapshot) => {
            const data = snapshot.val();
            currentStart = data ? data.start : null;
        });

        setInterval(() => {
            if (currentStart) {
                const diff = Date.now() - currentStart;
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            } else {
                document.getElementById('timer').innerText = "00:00:00";
            }
        }, 1000);

        onValue(ref(db, 'history'), (snapshot) => {
            const list = document.getElementById('history');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const item = child.val();
                list.innerHTML = `<li>${item.entry}</li>` + list.innerHTML;
            });
        });

        window.performAction = (type) => {
            const pass = prompt("Enter Password:");
            if (pass !== "Elettrica1") return alert("Wrong Password!");
            if (type === 'start') {
                update(ref(db, 'timerState'), { start: Date.now(), password: pass });
            } else {
                const duration = document.getElementById('timer').innerText;
                const entry = `<b>Total: ${duration}</b><br><small>${new Date().toLocaleString()}</small>`;
                const newHistoryRef = push(ref(db, 'history'));
                update(newHistoryRef, { entry: entry, password: pass });
                update(ref(db, 'timerState'), { start: null, password: pass });
            }
        };
    </script>
</head>
<body>

    <div class="card">
        <h2>Work Timer</h2>
        <div id="timer">00:00:00</div>
        <div class="controls">
            <button id="startBtn" onclick="performAction('start')">START</button>
            <button id="stopBtn" onclick="performAction('stop')">STOP</button>
        </div>
    </div>

    <div style="width: 100%; max-width: 400px;">
        <h3>History</h3>
        <ul id="history"></ul>
    </div>

</body>
</html>
