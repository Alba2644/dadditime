<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Work Timer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f9f9f9; }
        #timer { font-size: 3rem; text-align: center; margin: 20px 0; font-family: monospace; }
        .controls { display: flex; justify-content: center; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; }
        #startBtn { background: #28a745; color: white; }
        #stopBtn { background: #dc3545; color: white; }
        #clearBtn { background: #6c757d; color: white; margin-top: 10px; }
        #history { list-style: none; padding: 0; }
        #history li { background: white; padding: 10px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="timer">00:00:00</div>
    <div class="controls">
        <button id="startBtn" onclick="startTimer()">Start</button>
        <button id="stopBtn" onclick="stopTimer()">Stop & Log</button>
    </div>
    <button id="clearBtn" onclick="clearHistory()" style="width: 100%;">Clear History</button>

    <h2>History</h2>
    <ul id="history"></ul>

    <script>
        function updateDisplay() {
            const start = localStorage.getItem('startTime');
            if (start) {
                const elapsed = Date.now() - parseInt(start);
                const h = Math.floor(elapsed / 3600000).toString().padStart(2, '0');
                const m = Math.floor((elapsed % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }
        }
        function startTimer() {
            if (!localStorage.getItem('startTime')) {
                localStorage.setItem('startTime', Date.now());
                location.reload();
            }
        }
        function stopTimer() {
            const start = localStorage.getItem('startTime');
            if (start) {
                const duration = document.getElementById('timer').innerText;
                const entry = `Started: ${new Date(parseInt(start)).toLocaleTimeString()} | Duration: ${duration}`;
                let history = JSON.parse(localStorage.getItem('workHistory') || '[]');
                history.push(entry);
                localStorage.setItem('workHistory', JSON.stringify(history));
                localStorage.removeItem('startTime');
                location.reload();
            }
        }
        function clearHistory() { localStorage.removeItem('workHistory'); location.reload(); }
        function renderHistory() {
            const hList = document.getElementById('history');
            const history = JSON.parse(localStorage.getItem('workHistory') || '[]');
            history.forEach(item => { hList.innerHTML += `<li>${item}</li>`; });
        }
        if (localStorage.getItem('startTime')) setInterval(updateDisplay, 1000);
        renderHistory();
    </script>
</body>
</html>
